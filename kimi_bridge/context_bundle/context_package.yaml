SECTION 3: CLARIFIED PROBLEM STATEMENT (EXTRACTED VERBATIM)
================================================================================

PRIMARY PROBLEM:
"The global health internship ecosystem suffers from significant inefficiencies. Global health professionals face limited access to verified, relevant, and personalized opportunities, often encountering static or keyword-based platforms. Concurrently, organizations struggle with lengthy recruitment cycles, unreliable applicant filtering, and a lack of structured, scalable assessment for intern readiness."

SPECIFIC PAIN POINTS:
1. 75% of CVs rejected before reaching human reviewers
2. Lack of verified global health internships
3. No centralized platform for AI matching + mentorship
4. Hiring cycles in health fields exceed 44 days
5. Students lack actionable career guidance

TECHNICAL CHALLENGES IDENTIFIED:
1. Intelligent Discovery & Feed Generation: Moving beyond static listings to dynamic, personalized matching
2. AI-Powered Application Scoring Engine: Building automated, objective, scalable evaluation
3. Adaptive Multi-Stage Screening Pipeline: Generating unique adaptive assessments and grading diverse response types at scale
4. Mentorship Routing System: Intelligent matching based on specialization, availability, goals, and booking management
5. Employer Dashboard & Final Handoff: Integrating filtered candidate pipeline with intuitive dashboard providing actionable insights

