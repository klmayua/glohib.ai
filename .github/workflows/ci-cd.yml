# GlohibAI CI/CD Pipeline
# GitHub Actions Workflow

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ===========================================================================
  # LINT & VALIDATION
  # ===========================================================================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
        if: hashFiles('services/**/go.mod') != ''

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        if: hashFiles('services/**/requirements.txt') != ''

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        if: hashFiles('frontend/web/package.json') != ''

      - name: Lint Go services
        run: |
          go install golangci-lint/cmd/golangci-lint@latest
          for dir in services/*/; do
            if [ -f "$dir/go.mod" ]; then
              echo "Linting $dir"
              (cd $dir && golangci-lint run --timeout=5m)
            fi
          done
        if: hashFiles('services/**/go.mod') != ''

      - name: Lint Python services
        run: |
          pip install flake8 black mypy
          for dir in services/*/; do
            if [ -f "$dir/requirements.txt" ]; then
              echo "Linting $dir"
              (cd $dir && flake8 . && black --check .)
            fi
          done
        if: hashFiles('services/**/requirements.txt') != ''

      - name: Lint Frontend
        run: |
          cd frontend/web
          npm ci
          npm run lint
        if: hashFiles('frontend/web/package.json') != ''

  # ===========================================================================
  # SECURITY SCANNING
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Gitleaks secret detection
        run: |
          docker run --rm -v ${{ github.workspace }}:/path zricethezav/gitleaks:latest detect -v /path || true

  # ===========================================================================
  # BUILD CONTAINERS
  # ===========================================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Identity Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/identity-service
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/identity-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Student Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/student-service
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/student-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Internship Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/internship-service
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/internship-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Assessment Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/assessment-service
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/assessment-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Recommendation Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/recommendation-service
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/recommendation-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Scoring Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/scoring-service
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/scoring-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Video Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/video-service
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/video-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # RUN TESTS
  # ===========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Python service tests
        run: |
          for dir in services/*/; do
            if [ -f "$dir/requirements.txt" ]; then
              echo "Testing $dir"
              (cd $dir && pip install -r requirements.txt && pytest || echo "No tests found")
            fi
          done

      - name: Run Go service tests
        run: |
          for dir in services/*/; do
            if [ -f "$dir/go.mod" ]; then
              echo "Testing $dir"
              (cd $dir && go mod download && go test ./... || echo "No tests found")
            fi
          done

      - name: Run Frontend tests
        run: |
          cd frontend/web
          npm ci
          npm run test || echo "No tests configured"

  # ===========================================================================
  # DEPLOY TO STAGING (on main branch only)
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.glohib.ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add deployment commands here
          # Example: docker stack deploy -c docker-compose.staging.yml glohib
          echo "Staging deployment complete"

  # ===========================================================================
  # DEPLOY TO PRODUCTION (manual approval required)
  # ===========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://glohib.ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add deployment commands here
          # Example: docker stack deploy -c docker-compose.prod.yml glohib
          echo "Production deployment complete"
