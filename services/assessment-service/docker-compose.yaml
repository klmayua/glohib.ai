version: "3.9"
services:
  assessment-service:
    build: .
    ports:
      - "8084:8084"
    depends_on:
      - postgres
      - redis
    environment:
      - CONFIG_PATH=/root/config.yaml
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: glohib
      POSTGRES_PASSWORD: glohib
      POSTGRES_DB: glohib_db
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
volumes:
  pgdata:
  redisdata:
