syntax = "proto3";

package student;

option go_package = "github.com/glohib-ai/student-service/pkg/proto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

enum VectorType {
  VECTOR_TYPE_UNSPECIFIED = 0;
  VECTOR_TYPE_PROFILE = 1;
  VECTOR_TYPE_SKILLS = 2;
  VECTOR_TYPE_EXPERIENCE = 3;
}

service StudentService {
  rpc GetStudent(GetStudentRequest) returns (StudentResponse);
  rpc UpdateStudent(UpdateStudentRequest) returns (StudentResponse);
  rpc DeleteStudent(DeleteStudentRequest) returns (google.protobuf.Empty);
  rpc GenerateVector(GenerateVectorRequest) returns (VectorResponse);
  rpc GetVector(GetVectorRequest) returns (VectorResponse);
  rpc SearchSimilar(SearchSimilarRequest) returns (SearchSimilarResponse);
  rpc GetProfileScore(GetProfileScoreRequest) returns (ProfileScoreResponse);
  rpc AddSkill(AddSkillRequest) returns (SkillResponse);
  rpc RemoveSkill(RemoveSkillRequest) returns (google.protobuf.Empty);
  rpc AddEducation(AddEducationRequest) returns (EducationResponse);
  rpc RemoveEducation(RemoveEducationRequest) returns (google.protobuf.Empty);
  rpc AddExperience(AddExperienceRequest) returns (ExperienceResponse);
  rpc RemoveExperience(RemoveExperienceRequest) returns (google.protobuf.Empty);
}

message GetStudentRequest { string id = 1; }
message UpdateStudentRequest { string id = 1; StudentUpdate data = 2; }
message DeleteStudentRequest { string id = 1; }
message GenerateVectorRequest { string student_id = 1; VectorType type = 2; }
message GetVectorRequest { string student_id = 1; VectorType type = 2; }

message SearchSimilarRequest {
  repeated float vector = 1;
  VectorType type = 2;
  int32 limit = 3;
  double threshold = 4;
}

message GetProfileScoreRequest { string student_id = 1; }

message AddSkillRequest { string student_id = 1; SkillCreate skill = 2; }
message RemoveSkillRequest { string student_id = 1; string skill_id = 2; }
message AddEducationRequest { string student_id = 1; EducationCreate education = 2; }
message RemoveEducationRequest { string student_id = 1; string education_id = 2; }
message AddExperienceRequest { string student_id = 1; ExperienceCreate experience = 2; }
message RemoveExperienceRequest { string student_id = 1; string experience_id = 2; }

message StudentResponse { Student student = 1; }
message VectorResponse { ProfileVector vector = 1; }
message SearchSimilarResponse { repeated VectorSearchResult results = 1; }
message ProfileScoreResponse { ProfileScore score = 1; }
message SkillResponse { Skill skill = 1; }
message EducationResponse { Education education = 1; }
message ExperienceResponse { Experience experience = 1; }

message Student {
  string id = 1; string user_id = 2; string first_name = 3; string last_name = 4;
  string email = 5; string phone = 6; google.protobuf.Timestamp date_of_birth = 7;
  string gender = 8; string nationality = 9; string address = 10; string city = 11;
  string state = 12; string country = 13; string postal_code = 14;
  string profile_picture_url = 15; string bio = 16; string linkedin_url = 17;
  string github_url = 18; string website_url = 19; bool is_active = 20;
  double profile_complete = 21; google.protobuf.Timestamp created_at = 22;
  google.protobuf.Timestamp updated_at = 23; google.protobuf.Timestamp deleted_at = 24;
}

message StudentUpdate {
  optional string first_name = 1; optional string last_name = 2; optional string email = 3;
  optional string phone = 4; google.protobuf.Timestamp date_of_birth = 5; optional string gender = 6;
  optional string nationality = 7; optional string address = 8; optional string city = 9;
  optional string state = 10; optional string country = 11; optional string postal_code = 12;
  optional string profile_picture_url = 13; optional string bio = 14; optional string linkedin_url = 15;
  optional string github_url = 16; optional string website_url = 17; optional bool is_active = 18;
}

message ProfileVector {
  string id = 1; string student_id = 2; repeated float vector = 3;
  VectorType vector_type = 4; Metadata metadata = 5;
  google.protobuf.Timestamp created_at = 6; google.protobuf.Timestamp updated_at = 7;
}

message Metadata {
  string model_version = 1; string text_source = 2; int32 text_length = 3;
  double confidence = 4; map<string, string> tags = 5;
}

message VectorSearchResult { string student_id = 1; double similarity = 2; Student student = 3; }

message ProfileScore {
  string student_id = 1; double total_score = 2; double max_score = 3;
  double percentage = 4; ScoreBreakdown breakdown = 5; google.protobuf.Timestamp last_calculated = 6;
}

message ScoreBreakdown {
  double basic_info = 1; double contact_info = 2; double education = 3;
  double experience = 4; double skills = 5; double bio = 6; double links = 7;
  double profile_picture = 8;
}

message Skill {
  string id = 1; string student_id = 2; string name = 3; int32 proficiency = 4;
  string category = 5; google.protobuf.Timestamp created_at = 6; google.protobuf.Timestamp updated_at = 7;
}

message SkillCreate { string name = 1; int32 proficiency = 2; string category = 3; }

message Education {
  string id = 1; string student_id = 2; string institution = 3; string degree = 4;
  string field_of_study = 5; google.protobuf.Timestamp start_date = 6;
  google.protobuf.Timestamp end_date = 7; double gpa = 8; string description = 9; bool is_current = 10;
}

message EducationCreate {
  string institution = 1; string degree = 2; string field_of_study = 3;
  google.protobuf.Timestamp start_date = 4; google.protobuf.Timestamp end_date = 5;
  double gpa = 6; string description = 7; bool is_current = 8;
}

message Experience {
  string id = 1; string student_id = 2; string company = 3; string position = 4;
  google.protobuf.Timestamp start_date = 5; google.protobuf.Timestamp end_date = 6;
  string description = 7; bool is_current = 8;
}

message ExperienceCreate {
  string company = 1; string position = 2; google.protobuf.Timestamp start_date = 3;
  google.protobuf.Timestamp end_date = 4; string description = 5; bool is_current = 6;
}
