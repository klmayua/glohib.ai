version: "3.9"
services:
  student-service:
    build: .
    ports:
      - "8082:8082"
      - "50052:50052"
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_HOST=postgres
      - REDIS_HOST=redis

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: glohib
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: glohib_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
