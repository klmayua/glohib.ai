version: "3.9"
services:
  scorer:
    build: .
    ports:
      - "8000:8000"
      - "8001:8001"
    env_file: .env
    depends_on:
      - redis
      - postgres
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: glohib
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: glohib_db
    ports:
      - "5432:5432"
