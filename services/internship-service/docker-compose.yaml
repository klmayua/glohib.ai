version: "3.9"
services:
  internship-service:
    build: .
    ports:
      - "8083:8083"
      - "50053:50053"
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_HOST=postgres
      - REDIS_HOST=redis

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: glohib
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: glohib_db

  redis:
    image: redis:7-alpine
