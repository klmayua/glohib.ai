# =============================================================================
# CONSTRAINTS
# =============================================================================

constraints:
  - All work scoped to C:/Users/UCHE/my-qwen-project/PROJECTS/GlohibAI
  - ONE task per step
  - Build ONE Docker image at a time (slow machine)
  - Do NOT run 'docker compose up --build' (builds everything at once)
  - Do NOT run 'docker compose build' without specifying a service
  - Wait for each service to be healthy before starting the next
  - Test after each phase before moving on
