# =============================================================================
# BLOCK D — DOCKER DEPLOYMENT (one service at a time for slow Docker)
# Run ONLY after blocks A and B are complete
# =============================================================================

deployment_instructions: |
  IMPORTANT: Docker is slow on this machine. Build ONE image at a time.
  Do NOT run `docker compose build` (builds all at once, may OOM or timeout).
  Do NOT run `docker compose up --build` (same problem).
  Follow the steps below in EXACT order. Wait for each to finish.

deployment:

  # --- PHASE 1: Infrastructure (pull images, no build needed) ---

  - id: D1
    title: "Pull postgres image"
    command: "docker pull pgvector/pgvector:pg16"
    note: "~400MB download. Wait for it to finish."

  - id: D2
    title: "Pull redis image"
    command: "docker pull redis:7-alpine"
    note: "~30MB download."

  - id: D3
    title: "Pull minio image"
    command: "docker pull minio/minio:latest"
    note: "~200MB download."

  - id: D4
    title: "Pull minio/mc image (for bucket init)"
    command: "docker pull minio/mc:latest"
    note: "~30MB download."

  - id: D5
    title: "Pull postgres alpine (for migrations)"
    command: "docker pull postgres:16-alpine"
    note: "~80MB download."

  - id: D6
    title: "Start PostgreSQL"
    command: "docker compose up -d postgres"
    verify: "docker compose ps postgres"
    expected: "healthy"

  - id: D7
    title: "Start Redis"
    command: "docker compose up -d redis"
    verify: "docker compose ps redis"
    expected: "healthy"

  - id: D8
    title: "Start MinIO"
    command: "docker compose up -d minio"
    verify: "docker compose ps minio"
    expected: "healthy"

  # --- PHASE 2: Init containers ---

  - id: D9
    title: "Run database migrations"
    command: "docker compose up migrations"
    expected: "'All migrations applied.' in output"
    note: "This runs and exits. Wait for it to finish."

  - id: D10
    title: "Run MinIO bucket creation"
    command: "docker compose up minio-init"
    expected: "Bucket created or already exists."

  # --- PHASE 3: Build + start Go services (one at a time) ---

  - id: D11
    title: "Build identity-service image"
    command: "docker compose build identity-service"
    note: "First Go build downloads Go modules. May take 3-5 minutes."

  - id: D12
    title: "Start identity-service"
    command: "docker compose up -d identity-service"
    verify: "docker compose ps identity-service"
    expected: "healthy (wait 30-60 seconds)"

  - id: D13
    title: "Build student-service image"
    command: "docker compose build student-service"
    note: "Faster — shares Go base image cache with identity-service."

  - id: D14
    title: "Start student-service"
    command: "docker compose up -d student-service"
    verify: "docker compose ps student-service"
    expected: "healthy"

  - id: D15
    title: "Build internship-service image"
    command: "docker compose build internship-service"
    note: "Uses golang:1.23-alpine (different from others). May need fresh download."

  - id: D16
    title: "Start internship-service"
    command: "docker compose up -d internship-service"
    verify: "docker compose ps internship-service"
    expected: "healthy"

  - id: D17
    title: "Build assessment-service image"
    command: "docker compose build assessment-service"

  - id: D18
    title: "Start assessment-service"
    command: "docker compose up -d assessment-service"
    verify: "docker compose ps assessment-service"
    expected: "healthy"

  # --- PHASE 4: Build + start Python services ---

  - id: D19
    title: "Build recommendation-service image"
    command: "docker compose build recommendation-service"
    note: "Downloads sentence-transformers, PyTorch, etc. May take 5-10 minutes."

  - id: D20
    title: "Start recommendation-service"
    command: "docker compose up -d recommendation-service"
    verify: "docker compose ps recommendation-service"
    expected: "healthy (start_period is 30s — may take up to 60s)"

  - id: D21
    title: "Build scoring-service image"
    command: "docker compose build scoring-service"
    note: "Downloads XGBoost, SHAP, etc. May take 5-10 minutes."

  - id: D22
    title: "Start scoring-service"
    command: "docker compose up -d scoring-service"
    verify: "docker compose ps scoring-service"
    expected: "healthy"

  # --- PHASE 5: Build + start Node service ---

  - id: D23
    title: "Build video-service image"
    command: "docker compose build video-service"
    note: "Multi-stage build with ffmpeg. May take 3-5 minutes."

  - id: D24
    title: "Start video-service"
    command: "docker compose up -d video-service"
    verify: "docker compose ps video-service"
    expected: "healthy"

  # --- PHASE 6: Build + start Frontend ---

  - id: D25
    title: "Build frontend image"
    command: "docker compose build frontend"
    note: "Next.js build. May take 3-5 minutes."

  - id: D26
    title: "Start frontend"
    command: "docker compose up -d frontend"
    verify: "docker compose ps frontend"
    expected: "healthy (start_period is 30s)"

  # --- PHASE 7: Final verification ---

  - id: D27
    title: "Verify all containers running"
    command: "docker compose ps"
    expected: |
      All services show "Up" or "healthy":
        glohib-postgres         healthy
        glohib-redis            healthy
        glohib-minio            healthy
        glohib-identity-service healthy
        glohib-student-service  healthy
        glohib-internship-service healthy
        glohib-assessment-service healthy
        glohib-recommendation-service healthy
        glohib-scoring-service  healthy
        glohib-video-service    healthy
        glohib-frontend         healthy

  - id: D28
    title: "Test identity-service health"
    command: "curl -s http://localhost:8080/health"
    expected: "JSON response with status ok"

  - id: D29
    title: "Test frontend loads"
    command: "curl -s -o /dev/null -w '%{http_code}' http://localhost:3000"
    expected: "200"

  - id: D30
    title: "Open in browser"
    command: "Open http://localhost:3000 in your browser"
    expected: "GlohibAI student internship matching platform"

# =============================================================================
# TROUBLESHOOTING — If a service fails to build or start
# =============================================================================

troubleshooting:

  build_fails:
    - "Check logs: docker compose logs <service-name>"
    - "Check build: docker compose build --no-cache <service-name>"
    - "Go services: if go.sum error, delete go.sum and run go mod tidy (see A1)"
    - "Python services: if pip install fails, check requirements.txt versions"
    - "Node services: if npm install fails, delete package-lock.json and run npm install"

  service_unhealthy:
    - "Check logs: docker compose logs --tail=50 <service-name>"
    - "Common: service starts but DB connection fails → check postgres is healthy first"
    - "Common: 'connection refused' → check depends_on and service_healthy conditions"
    - "Recommendation/scoring: 30s+ start time is normal (loading ML models)"

  docker_slow:
    - "MOST IMPORTANT: Apply Block B (.dockerignore files) before building"
    - "Build one service at a time (follow D11-D26 order)"
    - "If out of disk: docker system prune -f"
    - "If out of memory: close other applications, increase Docker memory limit"

