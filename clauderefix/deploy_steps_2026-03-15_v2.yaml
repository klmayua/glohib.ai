# =============================================================================
# BLOCK A — FIX ERRORS (do ALL of these before ANY docker build)
# =============================================================================

block_a_errors:

  - id: A1
    title: "Fix identity-service go.sum — incomplete checksums"
    severity: HIGH
    file: services/identity-service/go.sum
    problem: |
      Only 11 lines — has ONLY go.mod hashes, missing module download hashes
      and ALL transitive dependency hashes. Compare to student-service (191 lines).
      go mod download will work but Docker layer caching is broken.
    action: |
      Run this command from the project root:
        docker run --rm -v "$(pwd)/services/identity-service:/app" -w /app golang:1.22-alpine go mod tidy
    fallback: |
      If Go is installed locally:
        cd services/identity-service
        go mod tidy
    verify: |
      The go.sum file should have 100+ lines with BOTH formats:
        github.com/gin-gonic/gin v1.9.1 h1:4idE...     (module hash)
        github.com/gin-gonic/gin v1.9.1/go.mod h1:hPrL... (go.mod hash)

  - id: A2
    title: "Add API_STUDENT to frontend next.config.js"
    severity: MEDIUM
    file: frontend/web/next.config.js
    problem: |
      next.config.js env block is missing API_STUDENT. The docker-compose.yml
      passes API_STUDENT as a runtime env var, but Next.js needs it in the
      env config to make it available in client-side code. Without this,
      any page that calls the student service from the browser will fail.
    action: |
      In frontend/web/next.config.js, change the env block from:
        env: {
          API_IDENTITY: process.env.API_IDENTITY || 'http://localhost:8080',
          API_INTERNSHIP: process.env.API_INTERNSHIP || 'http://localhost:8083',
          API_RECOMMENDATION: process.env.API_RECOMMENDATION || 'http://localhost:8007',
          API_VIDEO: process.env.API_VIDEO || 'http://localhost:4000',
        },
      To:
        env: {
          API_IDENTITY: process.env.API_IDENTITY || 'http://localhost:8080',
          API_STUDENT: process.env.API_STUDENT || 'http://localhost:8082',
          API_INTERNSHIP: process.env.API_INTERNSHIP || 'http://localhost:8083',
          API_RECOMMENDATION: process.env.API_RECOMMENDATION || 'http://localhost:8007',
          API_VIDEO: process.env.API_VIDEO || 'http://localhost:4000',
        },

  - id: A3
    title: "Fix frontend Dockerfile — remove invalid npm flag"
    severity: MEDIUM
    file: frontend/web/Dockerfile
    problem: |
      Line 4: `npm ci --frozen-lockfile` — `--frozen-lockfile` is a Yarn flag,
      not npm. npm ci already does frozen installs inherently. npm may warn
      or error on the unknown flag depending on version.
    action: |
      Change line 4 from:
        RUN npm ci --frozen-lockfile
      To:
        RUN npm ci

