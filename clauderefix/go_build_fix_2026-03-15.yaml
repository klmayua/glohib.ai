  why: |
    go mod tidy will:
    1. Add ALL missing indirect dependencies to go.mod
    2. Regenerate go.sum with proper h1: hashes for all direct + transitive deps
    3. Remove unused dependencies (like grpc which we removed in step 5)
  expected_result: |
