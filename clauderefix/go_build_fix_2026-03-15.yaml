    go.sum will grow from 11 lines to ~150+ lines (proper hashes)
  note: |
    If Docker is too slow or not available, you can also install Go 1.22 locally and run:
      cd C:/Users/UCHE/my-qwen-project/PROJECTS/GlohibAI/services/identity-service
      go mod tidy
