deploy:

  step_01:
    what: "Verify Docker is running"
    command: "docker info"
    expect: "Shows Docker engine info without errors"

  step_02:
    what: "Navigate to project root"
    command: "cd C:/Users/UCHE/my-qwen-project/PROJECTS/GlohibAI"

  step_03:
    what: "Ensure .env file is in place"
    command: "ls .env"
    expect: "File exists"

  step_04:
    what: "Build all Docker images (first time — takes 5-15 min)"
    command: "docker compose build"
    expect: "All 11 images built successfully"
    note: "Go services take longest due to dependency download"

  step_05:
    what: "Start infrastructure services only"
    command: "docker compose up -d postgres redis minio"
    expect: "3 containers started"

  step_06:
    what: "Wait for infrastructure health checks to pass"
    command: "docker compose ps"
    expect: "postgres, redis, minio all show (healthy)"
    wait: "30 seconds"

  step_07:
    what: "Start the MinIO bucket initializer"
    command: "docker compose up -d minio-init"
    expect: "Creates glohib and glohib-videos buckets"

  step_08:
    what: "Run database migrations"
    command: "docker compose up migrations"
    expect: "Applies 8 SQL files and exits with code 0"
    note: "This runs in foreground so you see the output"

  step_09:
    what: "Start all application services"
    command: "docker compose up -d identity-service student-service internship-service assessment-service"
    expect: "4 Go services started"

  step_10:
    what: "Start AI services (may take longer — downloads ML models)"
    command: "docker compose up -d recommendation-service scoring-service"
    expect: "2 Python services started"
    note: "recommendation-service downloads sentence-transformers model on first boot (~100MB)"

  step_11:
    what: "Start video service"
    command: "docker compose up -d video-service"
    expect: "Node.js service started"

  step_12:
    what: "Start frontend"
    command: "docker compose up -d frontend"
    expect: "Next.js frontend started on port 3000"

  step_13:
    what: "Check all services are healthy"
    command: "docker compose ps"
    expect: "All services show (healthy) status"

  step_14:
    what: "Test identity service health endpoint"
    command: "curl http://localhost:8080/health"
    expect: '{"status":"ok"} or similar'

  step_15:
    what: "Test student service health endpoint"
    command: "curl http://localhost:8082/health"
    expect: '{"status":"ok"}'

  step_16:
    what: "Test internship service health endpoint"
    command: "curl http://localhost:8083/health"
    expect: '{"status":"ok"}'

  step_17:
    what: "Test assessment service health endpoint"
    command: "curl http://localhost:8084/health"
    expect: '{"status":"ok"}'

  step_18:
    what: "Test recommendation service health endpoint"
    command: "curl http://localhost:8007/health"
    expect: '{"status":"healthy"}'

  step_19:
    what: "Test scoring service health endpoint"
    command: "curl http://localhost:8008/health"
    expect: '{"status":"ok"}'

  step_20:
    what: "Test video service health endpoint"
    command: "curl http://localhost:4000/health"
    expect: '{"status":"ok"}'

  step_21:
    what: "Open frontend in browser"
    command: "Open http://localhost:3000 in browser"
    expect: "GlohibAI landing page loads"

  step_22:
    what: "Verify MinIO console is accessible"
    command: "Open http://localhost:9001 in browser"
    expect: "MinIO login page (use minioadmin/minioadmin or .env credentials)"

