# =============================================================================
# GLOHIB.AI - INFRASTRUCTURE ONLY
# Hybrid Deployment: Docker for Infrastructure, Direct for Application
# =============================================================================

x-common-variables: &common-variables
  POSTGRES_USER: glohib
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-p9G60lDuECW5gKqiohyBxznpo+cheK+vgQEglgp1dgI=}
  POSTGRES_DB: glohib_db
  REDIS_PASSWORD: ${REDIS_PASSWORD:-UF5wtib+XBxd8NnGduUaSDy955RdtupkctFU0qTCesM=}

services:
  # ============================================================================
  # POSTGRESQL with pgvector
  # ============================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: glohib-postgres
    restart: unless-stopped
    environment:
      <<: *common-variables
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql:ro
    ports:
      - "127.0.0.1:5437:5432"  # PostgreSQL
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glohib"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - glohib-net
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================================================
  # REDIS for caching and sessions
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: glohib-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-GlohibRedis2026!} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6384:6379"  # Changed to avoid conflict
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-GlohibRedis2026!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - glohib-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================================================
  # MINIO for object storage (S3-compatible)
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: glohib-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9023:9000"      # API - Changed to avoid conflict
      - "127.0.0.1:9024:9001"      # Console - Changed to avoid conflict
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - glohib-net
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  glohib-net:
    driver: bridge
    name: glohib-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
